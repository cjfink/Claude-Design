<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Last Chance VIP Post" subtitle="Tweakable VIP urgency · 3 colorways" viewport="1600x1920" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCCF — Last Chance VIP · Tweakable</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="poster.jsx"></script>
<script type="text/babel">
const { useState } = React;
const PW = 480; // preview width per poster

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "copper",
  "layout": "stack",
  "heroNum": "",
  "headline": "VIP Sold Out",
  "scarcity": "GA still available",
  "scriptWord": "",
  "date": "09.12.2026",
  "badgeText": "VIP Access",
  "showBadge": true,
  "showRegMarks": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const H = Math.round(1920 * PW / 1080);
  const shared = {
    w: PW, layout: t.layout, date: t.date, accent: t.accent,
    heroNum: t.heroNum, headline: t.headline, scarcity: t.scarcity,
    scriptWord: t.scriptWord, badgeText: t.badgeText,
    showBadge: t.showBadge, showRegMarks: t.showRegMarks,
  };
  return (
    <React.Fragment>
      <DesignCanvas title="Last Chance · VIP" subtitle="9:16 · 1080×1920 · scarcity announcement">
        <DCSection id="colorways" title="VIP Announcement" subtitle="Same layout across the three brand grounds — edit copy & accents in Tweaks">
          <DCArtboard id="forest" label="A · Forest" width={PW} height={H}>
            <Poster {...shared} colorway="forest" />
          </DCArtboard>
          <DCArtboard id="black" label="B · Black" width={PW} height={H}>
            <Poster {...shared} colorway="black" />
          </DCArtboard>
          <DCArtboard id="crema" label="C · Crema (light)" width={PW} height={H}>
            <Poster {...shared} colorway="crema" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel>
        <TweakSection label="Message" />
        <TweakText   label="Hero number"  value={t.heroNum}    onChange={(v) => setTweak('heroNum', v)} />
        <TweakText   label="Headline"     value={t.headline}   onChange={(v) => setTweak('headline', v)} />
        <TweakText   label="Script lead"  value={t.scriptWord} onChange={(v) => setTweak('scriptWord', v)} />
        <TweakText   label="Scarcity"     value={t.scarcity}   onChange={(v) => setTweak('scarcity', v)} />
        <TweakText   label="Date"         value={t.date}       onChange={(v) => setTweak('date', v)} />

        <TweakSection label="VIP & Accent" />
        <TweakRadio  label="Accent" value={t.accent}
                     options={['copper', 'gold', 'terracotta']}
                     onChange={(v) => setTweak('accent', v)} />
        <TweakToggle label="VIP badge"   value={t.showBadge}  onChange={(v) => setTweak('showBadge', v)} />
        <TweakText   label="Badge text"  value={t.badgeText}  onChange={(v) => setTweak('badgeText', v)} />

        <TweakSection label="Layout" />
        <TweakRadio  label="Lockup" value={t.layout}
                     options={['stack', 'seal']}
                     onChange={(v) => setTweak('layout', v)} />
        <TweakToggle label="Corner marks" value={t.showRegMarks} onChange={(v) => setTweak('showRegMarks', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
