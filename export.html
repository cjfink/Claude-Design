<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCCF — 100 Days · Export</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #777; }
  .slide { width: 1080px; height: 1920px; position: relative; overflow: hidden; }
  .slide > .pst-mount { position: absolute; inset: 0; }
  /* disable expensive feTurbulence grain for fast capture */
  .pst::after { display: none !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="poster.jsx"></script>
<script type="text/babel">
const VARIANTS = [
  { id:'v0', colorway:'forest', layout:'stack' },
  { id:'v1', colorway:'crema',  layout:'stack' },
  { id:'v2', colorway:'black',  layout:'stack' },
  { id:'v3', colorway:'forest', layout:'seal'  },
  { id:'v4', colorway:'crema',  layout:'seal'  },
];
function All(){
  return (
    <React.Fragment>
      {VARIANTS.map(v => (
        <div className="slide" id={v.id} key={v.id}>
          <Poster w={1080} colorway={v.colorway} layout={v.layout} />
        </div>
      ))}
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<All />);
</script>
</body>
</html>
