<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCCF — HD Export</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #777; }
  #slide { width: 1080px; height: 1920px; position: relative; overflow: hidden; }
  #slide > .pst-mount { position: absolute; inset: 0; }
  #slide.noframe .pst-frame { border: none !important; }
  #slide.noframe .pst-reg { display: none !important; }
</style>
<script>
  // synchronous stub so gen_pptx showJs works before Babel finishes
  window.__pending = 0; window.__noframe = false; window.__ready = false;
  window.renderVariant = function(i, nf){
    window.__pending = i|0; window.__noframe = !!nf;
    if (window.__ready) window.__apply();
  };
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="slide"></div>
<script type="text/babel" src="poster.jsx"></script>
<script type="text/babel">
const VARIANTS = [
  { colorway:'forest', layout:'stack' },
  { colorway:'crema',  layout:'stack' },
  { colorway:'black',  layout:'stack' },
  { colorway:'forest', layout:'seal'  },
  { colorway:'crema',  layout:'seal'  },
];
const slide = document.getElementById('slide');
const root = ReactDOM.createRoot(slide);
window.__apply = () => {
  slide.className = window.__noframe ? 'noframe' : '';
  const v = VARIANTS[window.__pending];
  root.render(<Poster w={1080} colorway={v.colorway} layout={v.layout} />);
};
window.__ready = true;
window.__apply();
</script>
</body>
</html>
