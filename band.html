<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCCF — Band Export</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #777; }
  #slide { position: relative; overflow: hidden; }
  #slide > .pst-mount { position: absolute; inset: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="slide"></div>
<script type="text/babel" src="poster.jsx"></script>
<script type="text/babel">
const VARIANTS = [
  { colorway:'forest', layout:'stack' },
  { colorway:'crema',  layout:'stack' },
  { colorway:'black',  layout:'stack' },
  { colorway:'forest', layout:'seal'  },
  { colorway:'crema',  layout:'seal'  },
];
const slide = document.getElementById('slide');
const root = ReactDOM.createRoot(slide);
window.showVariant = (i) => {
  const w = window.innerWidth;
  const h = Math.round(w * 1920 / 1080);
  slide.style.width = w + 'px';
  slide.style.height = h + 'px';
  root.render(<Poster w={w} colorway={VARIANTS[i].colorway} layout={VARIANTS[i].layout} />);
  window.scrollTo(0, 0);
};
window.showVariant(0);
</script>
</body>
</html>
