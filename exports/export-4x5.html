<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TCCF 4:5 export</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  :root{--cream:#EBE5DB; --offwhite:#F7F6F2; --muted:#BAB492; --coral:#AA7050; --latte:#746137; --tint:0.20;}
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%; height:100%; overflow:hidden; background:#0c0b0a; -webkit-font-smoothing:antialiased; font-family:var(--font-body);}
  #poster{position:absolute; left:0; top:0; width:1080px; height:1350px; overflow:hidden; background:#1a1714; color:var(--cream); transform-origin:top left;}
  .bg{position:absolute; inset:0; background-size:cover; background-position:center 50%;
    background-image:url('../poster-assets/bg/c-crowd.jpg');}
  .grad{position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(20,17,14,.88) 0%, rgba(20,17,14,.40) 26%, rgba(20,17,14,.34) 46%, rgba(20,17,14,.66) 66%, rgba(20,17,14,.92) 78%);}
  .tint{position:absolute; inset:0; background:#16120f; opacity:var(--tint);}
  .content{position:absolute; left:0; right:0; top:0; height:940px;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:62px 70px 26px; text-align:center;}
  .top{display:flex; flex-direction:column; align-items:center; gap:15px;}
  .crest{height:80px; width:auto; opacity:.96;}
  .eyebrow{font-family:var(--font-mono); font-size:14px; letter-spacing:.28em; text-transform:uppercase; color:var(--cream); opacity:.82;}
  .headline{display:flex; flex-direction:column; align-items:center; gap:2px; margin-top:auto;}
  .script{font-family:var(--font-script); font-style:italic; font-size:54px; line-height:.8; color:var(--cream); margin-bottom:6px; transform:translateX(-110px) rotate(-4deg); opacity:.95;}
  .hl-stack{font-family:var(--font-display); text-transform:uppercase; font-weight:400; font-size:114px; line-height:.9; letter-spacing:-.015em; color:var(--offwhite); text-shadow:0 2px 30px rgba(0,0,0,.35);}
  .hl-stack span{display:block;}
  .hl-stack .coffee{color:var(--cream);}
  .dateline{display:flex; align-items:center; gap:20px; margin-top:26px;}
  .dateline .rule{height:1.5px; width:62px; background:var(--cream); opacity:.7;}
  .dateline .d{font-family:var(--font-display); text-transform:uppercase; letter-spacing:.06em; font-size:36px; color:var(--cream);}
  .details{display:flex; flex-direction:column; align-items:stretch; gap:0; width:700px; border-top:1.5px solid rgba(235,229,219,.34); margin-top:auto;}
  .drow{display:flex; align-items:center; gap:16px; padding:14px 4px; border-bottom:1.5px solid rgba(235,229,219,.20);}
  .drow:last-child{border-bottom:none;}
  .drow svg{width:25px; height:25px; flex:0 0 25px; stroke:var(--cream); stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; opacity:.92;}
  .drow .lbl{font-family:var(--font-mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); width:96px; text-align:left; flex:0 0 96px;}
  .drow .val{font-family:var(--font-display); text-transform:uppercase; letter-spacing:.005em; font-size:23px; color:var(--cream); text-align:left; line-height:1.04;}
  .drow .val .sub{display:block; font-family:var(--font-mono); text-transform:uppercase; font-size:12.5px; letter-spacing:.16em; color:var(--muted); margin-top:6px;}
  .partners{position:absolute; left:0; right:0; bottom:0; height:410px; background:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 64px 34px; gap:24px; box-shadow:inset 0 2px 0 rgba(33,30,26,.9);}
  .tiers{display:flex; align-items:center; justify-content:center; gap:54px; width:100%;}
  .tier{display:flex; flex-direction:column; align-items:center; gap:14px;}
  .tlabel{font-family:var(--font-mono); font-size:12px; letter-spacing:.30em; text-transform:uppercase; color:var(--latte);}
  .t-logo{max-height:66px; max-width:230px; width:auto; object-fit:contain;}
  .t-logo.maizly{max-height:50px;}
  .tdiv{width:1px; height:78px; background:rgba(33,30,26,.18);}
  .plabel{display:flex; align-items:center; gap:16px; width:100%; justify-content:center;}
  .plabel .r{height:1px; flex:1; background:rgba(33,30,26,.20);}
  .plabel span{font-family:var(--font-mono); font-size:12px; letter-spacing:.32em; text-transform:uppercase; color:var(--latte);}
  .logo-grid{display:grid; grid-template-columns:repeat(5,1fr); grid-auto-rows:58px; align-items:center; justify-items:center; column-gap:30px; row-gap:14px; width:100%;}
  .logo-grid img{max-height:44px; max-width:150px; width:auto; object-fit:contain; opacity:.92;}
</style>
</head>
<body>
  <div id="poster">
    <div class="bg"></div>
    <div class="grad"></div>
    <div class="tint"></div>
    <div class="content">
      <div class="top">
        <img class="crest" src="../poster-assets/crest-crema.png" alt="TCCF crest">
        <div class="eyebrow">A Celebration of Coffee &amp; the People That Shape It</div>
      </div>
      <div class="headline">
        <div class="script">The</div>
        <div class="hl-stack"><span>Charlotte</span><span class="coffee">Coffee</span><span>Festival</span></div>
        <div class="dateline"><span class="rule"></span><span class="d">September 12, 2026</span><span class="rule"></span></div>
      </div>
      <div class="details">
        <div class="drow">
          <svg viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <div class="lbl">Location</div>
          <div class="val">Lenny Boy Brewing Co.<span class="sub">Charlotte, NC</span></div>
        </div>
        <div class="drow">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
          <div class="lbl">Time</div>
          <div class="val">9 AM – 2 PM</div>
        </div>
        <div class="drow">
          <svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 0 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v3M13 11v2M13 16v3"/></svg>
          <div class="lbl">Tickets</div>
          <div class="val">Live Now<span class="sub">WWW.CLTCOFFEEFESTIVAL.COM/TICKETS</span></div>
        </div>
      </div>
    </div>
    <div class="partners">
      <div class="tiers">
        <div class="tier"><span class="tlabel">Presented By</span><img class="t-logo" src="../poster-assets/logos/night-swim.png" alt="Night Swim Coffee"></div>
        <div class="tdiv"></div>
        <div class="tier"><span class="tlabel">Sponsored By</span><img class="t-logo maizly" src="../poster-assets/logos/maizly.png" alt="Maizly"></div>
      </div>
      <div class="plabel"><span class="r"></span><span>Supporting Partners</span><span class="r"></span></div>
      <div class="logo-grid">
        <img src="../poster-assets/logos/odeko.png" alt="Odeko">
        <img src="../poster-assets/logos/barista.png" alt="Barista Magazine">
        <img src="../poster-assets/logos/charlotte-water.png" alt="Charlotte Water">
        <img src="../poster-assets/logos/coffee-destiny.png" alt="Coffee Destiny">
        <img src="../poster-assets/logos/miir.png" alt="MiiR">
        <img src="../poster-assets/logos/simonelli.png" alt="Simonelli Group">
        <img src="../poster-assets/logos/hornets.png" alt="Charlotte Hornets">
        <img src="../poster-assets/logos/baratza.png" alt="Baratza">
        <img src="../poster-assets/logos/califia.png" alt="Califia Farms">
        <img src="../poster-assets/logos/moccamaster.png" alt="Moccamaster">
      </div>
    </div>
  </div>
<script>
  function fitHead(){
    const stack=document.querySelector('.hl-stack'); stack.style.fontSize='';
    const cs=getComputedStyle(stack); const base=parseFloat(cs.fontSize), ls=parseFloat(cs.letterSpacing)||0;
    const ctx=document.createElement('canvas').getContext('2d'); ctx.font=cs.fontWeight+' '+base+'px '+cs.fontFamily;
    let max=0; stack.querySelectorAll('span').forEach(s=>{const t=s.textContent;const w=ctx.measureText(t).width+Math.max(0,t.length-1)*ls; if(w>max)max=w;});
    const avail=1080-140-6; if(max>avail) stack.style.fontSize=(base*avail/max)+'px';
  }
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(fitHead);}
  window.addEventListener('load',fitHead); fitHead();
  function fitView(){
    const s=Math.min(window.innerWidth/1080, window.innerHeight/1350);
    document.getElementById('poster').style.transform='scale('+s+')';
  }
  window.addEventListener('resize',fitView); window.addEventListener('load',fitView); fitView();
</script>
</body>
</html>
