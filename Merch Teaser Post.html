<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCCF — Merch Teaser · Instagram</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="posts.jsx"></script>
<script type="text/babel">
const PW = 432; // preview width (1080 * 0.4)
const PH = Math.round(1350 * PW / 1080);

function App() {
  return (
    <DesignCanvas title="Merch Teaser · Instagram" subtitle="4:5 · 1080×1350 · pick a direction">
      <DCSection id="opts" title="Three directions" subtitle="Same drop, different energy — drag to compare, double-click to focus">
        <DCArtboard id="grid" label="A · The Lineup (product grid)" width={PW} height={PH}>
          <Post w={PW} layout="A" />
        </DCArtboard>
        <DCArtboard id="life" label="B · Lifestyle (photo-led)" width={PW} height={PH}>
          <Post w={PW} layout="B" />
        </DCArtboard>
        <DCArtboard id="type" label="C · Bold Type" width={PW} height={PH}>
          <Post w={PW} layout="C" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
